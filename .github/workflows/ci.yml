name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies only
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi>=0.110.0 \
            httpx>=0.27.0 \
            pytest>=8.1.0 \
            pytest-cov>=5.0.0 \
            pydantic>=2.0.0 \
            python-dotenv>=1.0.1 \
            streamlit>=1.32.0

      - name: Set dummy API key
        run: echo "OPENAI_API_KEY=test-key" >> $GITHUB_ENV

      - name: Run API tests
        run: |
          pytest tests/test_api.py -v --tb=short

  api-smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install fastapi httpx uvicorn pytest pydantic python-dotenv streamlit

      - name: Run API smoke test
        run: pytest tests/test_api.py -v --tb=short
        env:
          OPENAI_API_KEY: test-key
