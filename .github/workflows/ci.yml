name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            langchain>=0.1.12 \
            langchain-community>=0.0.28 \
            faiss-cpu>=1.7.4 \
            sentence-transformers>=2.5.1 \
            pypdf>=4.1.0 \
            python-dotenv>=1.0.1 \
            fastapi>=0.110.0 \
            httpx>=0.27.0 \
            pytest>=8.1.0 \
            pytest-cov>=5.0.0

      - name: Set dummy API key (tests use local embeddings — no real calls)
        run: echo "OPENAI_API_KEY=test-key" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  api-smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API deps
        run: pip install fastapi httpx uvicorn pytest pytest-asyncio

      - name: Run API smoke test
        run: pytest tests/test_api.py -v --tb=short
        env:
          OPENAI_API_KEY: test-key
